<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PayWay | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
/* ...نفس الـ CSS من النسخة السابقة بدون تغييرات كبيرة... */
</style>
</head>
<body>
<div class="login-card">
  <div class="card-header">
    <div class="brand">
      <img class="brand-logo" src="https://i.postimg.cc/NfPBr7hs/Picsart-26-04-02-02-54-03-157.jpg" alt="PayWay">
      <h1 id="brandTitle">PayWay</h1>
    </div>
    <div class="header-actions">
      <div class="darkmode-toggle" id="darkModeToggle">
        <i class="fas fa-moon toggle-icon" id="toggleIcon"></i>
        <span class="toggle-text" id="modeText">داكن</span>
      </div>
      <div class="lang-switch">
        <button class="lang-btn active" id="btnAr" data-lang="ar">العربية</button>
        <button class="lang-btn" id="btnEn" data-lang="en">English</button>
      </div>
    </div>
  </div>

  <div class="welcome-section">
    <div class="welcome-icon"><i class="fas fa-chalkboard-user"></i></div>
    <h2 id="welcomeTitle">تسجيل الدخول</h2>
    <p id="welcomeDesc">قم بإدخال بياناتك للوصول إلى لوحة التحكم</p>
  </div>

  <div class="form-container">
    <div class="input-group">
      <label id="usernameLabel"><i class="fas fa-user"></i> اسم المستخدم</label>
      <input type="text" id="username" placeholder="أدخل اسم المستخدم">
    </div>
    <div class="input-group">
      <label id="passwordLabel"><i class="fas fa-lock"></i> كلمة المرور</label>
      <input type="password" id="password" placeholder="أدخل كلمة المرور">
    </div>
    <button class="btn-login" id="loginBtn">
      <i class="fas fa-arrow-right-to-bracket"></i>
      <span id="loginBtnText">تسجيل الدخول</span>
    </button>
  </div>

  <div class="footer">
    <i class="fas fa-shield-alt"></i> <span id="footerText">© 2026 PayWay Dashboard</span> — 
    <a href="https://wa.me/201274445091" target="_blank">John Latif <i class="fab fa-whatsapp"></i></a>
  </div>
</div>

<div id="errorToast" class="error-toast"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {

const darkModeToggle = document.getElementById('darkModeToggle');
const toggleIcon = document.getElementById('toggleIcon');
const modeTextSpan = document.getElementById('modeText');
let currentLang = 'ar';

const translations = {
  ar:{brand:"PayWay",welcomeTitle:"تسجيل الدخول",welcomeDesc:"قم بإدخال بياناتك للوصول إلى لوحة التحكم",usernameLabel:"اسم المستخدم",passwordLabel:"كلمة المرور",loginBtn:"تسجيل الدخول",footer:"© 2026 PayWay Dashboard",errorMessage:"حدث خطأ أثناء تسجيل الدخول. يرجى المحاولة.",successRedirect:"جاري التوجيه إلى لوحة التحكم..."},
  en:{brand:"PayWay",welcomeTitle:"Dashboard Login",welcomeDesc:"Enter your credentials to access the dashboard",usernameLabel:"Username",passwordLabel:"Password",loginBtn:"Login",footer:"© 2026 PayWay Dashboard",errorMessage:"Login error. Please try again.",successRedirect:"Redirecting to dashboard..."}
};

// ==================== DARK MODE ====================
function setDarkMode(enabled){
  if(enabled){
    document.body.classList.add('dark');
    toggleIcon.className='fas fa-sun toggle-icon';
    modeTextSpan.innerText=currentLang==='ar'?'فاتح':'Light';
    localStorage.setItem('payway-darkmode','enabled');
  }else{
    document.body.classList.remove('dark');
    toggleIcon.className='fas fa-moon toggle-icon';
    modeTextSpan.innerText=currentLang==='ar'?'داكن':'Dark';
    localStorage.setItem('payway-darkmode','disabled');
  }
}
const savedMode = localStorage.getItem('payway-darkmode');
setDarkMode(savedMode==='enabled');
darkModeToggle.addEventListener('click', e=>{
  e.preventDefault();
  setDarkMode(!document.body.classList.contains('dark'));
});

// ==================== LANGUAGE ====================
function updateLanguage(lang){
  currentLang=lang;
  const t=translations[lang];
  document.getElementById('brandTitle').innerText=t.brand;
  document.getElementById('welcomeTitle').innerText=t.welcomeTitle;
  document.getElementById('welcomeDesc').innerText=t.welcomeDesc;
  document.getElementById('usernameLabel').innerHTML=`<i class="fas fa-user"></i> ${t.usernameLabel}`;
  document.getElementById('passwordLabel').innerHTML=`<i class="fas fa-lock"></i> ${t.passwordLabel}`;
  document.getElementById('loginBtnText').innerText=t.loginBtn;
  document.getElementById('footerText').innerText=t.footer;
  const isAr=lang==='ar';
  document.getElementById('username').placeholder=isAr?"أدخل اسم المستخدم":"Enter username";
  document.getElementById('password').placeholder=isAr?"أدخل كلمة المرور":"Enter password";
  const isDark=document.body.classList.contains('dark');
  modeTextSpan.innerText=isDark?(lang==='ar'?'فاتح':'Light'):(lang==='ar'?'داكن':'Dark');
  document.body.style.direction=isAr?'rtl':'ltr';
  document.getElementById('btnAr').classList.toggle('active',lang==='ar');
  document.getElementById('btnEn').classList.toggle('active',lang==='en');
}
document.getElementById('btnAr').addEventListener('click',()=>updateLanguage('ar'));
document.getElementById('btnEn').addEventListener('click',()=>updateLanguage('en'));
updateLanguage('ar');

// ==================== LOGIN ====================
const errorToast=document.getElementById('errorToast');
function showError(message){
  errorToast.innerText=message;
  errorToast.style.display='block';
  setTimeout(()=>{errorToast.style.display='none';},3000);
}

function login(){
  // هنا يتم ربط بيانات الدخول مع الخادم الفعلي (API/DB)
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value.trim();
  const t=translations[currentLang];

  // مؤقت: رسالة نجاح/فشل للتوضيح
  if(username && password){
    alert(t.successRedirect);
    // هنا يمكن عمل إعادة توجيه حقيقي: window.location.href='/dashboard';
  } else {
    showError(t.errorMessage);
  }
}

document.getElementById('loginBtn').addEventListener('click',login);
['username','password'].forEach(id=>{
  document.getElementById(id).addEventListener('keypress',e=>{
    if(e.key==='Enter') login();
  });
});

});
</script>
</body>
</html>

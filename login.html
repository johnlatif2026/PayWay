<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول Dashboard</title>
<style>
body { font-family: Cairo, sans-serif; background:#f5f5f5; margin:0; padding:0;}
.container { max-width:400px; margin:80px auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
h2 { text-align:center; color:#1a3e8c;}
input { width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px; }
button { background:#1a3e8c; color:white; padding:12px; border:none; border-radius:4px; cursor:pointer; width:100%; }
button:hover { background:#1550a0; }
</style>
</head>
<body>
<div class="container">
<h2>تسجيل دخول Dashboard</h2>
<input type="text" id="username" placeholder="اسم المستخدم">
<input type="password" id="password" placeholder="كلمة المرور">
<button onclick="login()">تسجيل الدخول</button>
</div>
<script>
async function login(){
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const res = await fetch('/api/login', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username,password})
  });
  const data = await res.json();
  if(res.status===200){ localStorage.setItem('token',data.token); window.location.href='/dashboard'; }
  else{ alert('بيانات الدخول خاطئة'); }
}
</script>
</body>
</html>
